{% extends 'layout.html' %} {% block body %}

<style>
  .market-header {
    text-align: center;
    margin-bottom: 40px;
    padding: 40px 20px;
    background: rgba(63, 166, 106, 0.05);
    border-radius: 20px;
    border: 1px solid rgba(63, 166, 106, 0.2);
    animation: fadeIn 0.8s ease;
  }

  .market-header h1 {
    font-size: 3rem;
    background: linear-gradient(135deg, #3fa66a 0%, #8ed9a6 100%);
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
  }

  .market-header p {
    font-size: 1.2rem;
    opacity: 0.8;
    color: var(--text-secondary);
  }

  .search-section {
    background: rgba(63, 166, 106, 0.05);
    padding: 30px;
    border-radius: 20px;
    margin-bottom: 40px;
    backdrop-filter: blur(15px);
    border: 1px solid rgba(63, 166, 106, 0.2);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 20px;
  }

  .form-group label {
    display: block;
    margin-bottom: 8px;
    color: var(--accent-primary);
    font-weight: 600;
    font-size: 0.9rem;
    text-transform: uppercase;
  }

  .form-group select,
  .form-group input {
    width: 100%;
    padding: 12px 15px;
    border: 2px solid rgba(63, 166, 106, 0.3);
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.05);
    color: var(--text-primary);
    font-size: 1rem;
    transition: all 0.3s ease;
  }

  .form-group select:focus,
  .form-group input:focus {
    outline: none;
    border-color: var(--accent-primary);
    box-shadow: 0 0 20px rgba(63, 166, 106, 0.3);
  }

  .predict-btn {
    background: linear-gradient(135deg, #3fa66a, #2e8b57);
    color: white;
    padding: 15px 40px;
    border: none;
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    text-transform: uppercase;
    box-shadow: 0 4px 20px rgba(63, 166, 106, 0.4);
    display: block;
    margin: 0 auto;
  }

  .predict-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 30px rgba(63, 166, 106, 0.6);
  }

  .cards-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 25px;
    margin-top: 40px;
  }

  .price-card {
    background: rgba(255, 255, 255, 0.06);
    border-radius: 20px;
    padding: 25px;
    backdrop-filter: blur(20px);
    border: 1px solid rgba(63, 166, 106, 0.2);
    overflow: hidden;
    transition: all 0.3s ease;
    animation: fadeInUp 0.6s ease both;
  }

  .price-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 12px 40px rgba(63, 166, 106, 0.3);
    border-color: rgba(63, 166, 106, 0.5);
  }

  .price-card::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #3fa66a, #8ed9a6);
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .crop-name {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--accent-primary);
  }

  .trend-indicator {
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
  }

  .trend-up {
    background: rgba(63, 166, 106, 0.2);
    color: #3fa66a;
  }

  .trend-down {
    background: rgba(239, 68, 68, 0.2);
    color: #ef4444;
  }

  .price-details {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    margin-bottom: 20px;
  }

  .price-item {
    text-align: center;
    padding: 10px;
    background: rgba(63, 166, 106, 0.08);
    border-radius: 10px;
    border: 1px solid rgba(63, 166, 106, 0.1);
  }

  .price-label {
    font-size: 0.8rem;
    color: var(--text-secondary);
    margin-bottom: 5px;
    text-transform: uppercase;
  }

  .price-value {
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--accent-primary);
  }

  .market-info {
    display: flex;
    justify-content: space-between;
    padding-top: 15px;
    border-top: 1px solid rgba(63, 166, 106, 0.1);
    font-size: 0.9rem;
    color: var(--text-secondary);
  }

  .loading {
    display: none;
    text-align: center;
    padding: 40px;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 4px solid rgba(63, 166, 106, 0.3);
    border-top: 4px solid #3fa66a;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 20px;
  }

  @keyframes spin {
    0% {
      transform: rotate(0deg);
    }
    100% {
      transform: rotate(360deg);
    }
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
    }
    to {
      opacity: 1;
    }
  }

  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .no-data {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-secondary);
    font-size: 1.1rem;
  }

  @media (max-width: 768px) {
    .market-header h1 {
      font-size: 2rem;
    }
    .form-grid {
      grid-template-columns: 1fr;
    }
    .cards-container {
      grid-template-columns: 1fr;
    }
    .price-details {
      grid-template-columns: 1fr;
    }
  }
</style>

<div class="container" style="padding-top: 40px">
  <div class="market-header">
    <h1>📊 Live Market Prices</h1>
    <p>
      Real-time agricultural commodity prices - Stay updated with market trends
    </p>
  </div>

  <div class="search-section">
    <div class="form-grid">
      <div class="form-group">
        <label for="state">Select State</label>
        <select id="state">
          <option value="">Choose State</option>
          <option value="uttar-pradesh">Uttar Pradesh</option>
          <option value="punjab">Punjab</option>
          <option value="haryana">Haryana</option>
          <option value="rajasthan">Rajasthan</option>
          <option value="maharashtra">Maharashtra</option>
          <option value="karnataka">Karnataka</option>
        </select>
      </div>

      <div class="form-group">
        <label for="city">Select City/Mandi</label>
        <select id="city">
          <option value="">Choose City</option>
        </select>
      </div>

      <div class="form-group">
        <label for="crop">Select Crop</label>
        <select id="crop">
          <option value="">All Crops</option>
          <option value="wheat">Wheat</option>
          <option value="rice">Rice</option>
          <option value="sugarcane">Sugarcane</option>
          <option value="cotton">Cotton</option>
          <option value="maize">Maize</option>
          <option value="groundnut">Groundnut</option>
        </select>
      </div>

      <div class="form-group">
        <label for="date">Select Date</label>
        <input type="date" id="date" />
      </div>
    </div>

    <button class="predict-btn" onclick="fetchPrices()">
      🔍 Get Live Prices
    </button>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Fetching latest market prices...</p>
  </div>

  <div class="cards-container" id="priceCards"></div>

  <div class="no-data" id="noData" style="display: none">
    <h3>No data available</h3>
    <p>Please select state and city to view live market prices</p>
  </div>
</div>

<script>
  document.getElementById("date").valueAsDate = new Date();

  const samplePriceData = [
    {
      crop: "Wheat",
      icon: "🌾",
      minPrice: 2100,
      maxPrice: 2350,
      modalPrice: 2225,
      trend: "up",
      market: "Delhi Mandi",
      lastUpdated: "2 hours ago",
    },
    {
      crop: "Rice",
      icon: "🍚",
      minPrice: 1800,
      maxPrice: 2100,
      modalPrice: 1950,
      trend: "down",
      market: "Mumbai Mandi",
      lastUpdated: "1 hour ago",
    },
    {
      crop: "Sugarcane",
      icon: "🎋",
      minPrice: 280,
      maxPrice: 320,
      modalPrice: 300,
      trend: "up",
      market: "Pune Mandi",
      lastUpdated: "3 hours ago",
    },
    {
      crop: "Cotton",
      icon: "☁️",
      minPrice: 5200,
      maxPrice: 5800,
      modalPrice: 5500,
      trend: "up",
      market: "Ahmedabad Mandi",
      lastUpdated: "2 hours ago",
    },
    {
      crop: "Maize",
      icon: "🌽",
      minPrice: 1600,
      maxPrice: 1850,
      modalPrice: 1725,
      trend: "up",
      market: "Hyderabad Mandi",
      lastUpdated: "1 hour ago",
    },
    {
      crop: "Groundnut",
      icon: "🥜",
      minPrice: 4500,
      maxPrice: 5200,
      modalPrice: 4850,
      trend: "up",
      market: "Chennai Mandi",
      lastUpdated: "3 hours ago",
    },
  ];

  function fetchPrices() {
    const state = document.getElementById("state").value;
    const city = document.getElementById("city").value;

    if (!state || !city) {
      alert("Please select both state and city");
      return;
    }

    document.getElementById("loading").style.display = "block";
    document.getElementById("priceCards").innerHTML = "";
    document.getElementById("noData").style.display = "none";

    setTimeout(() => {
      document.getElementById("loading").style.display = "none";
      displayPriceCards(samplePriceData);
    }, 2000);
  }

  function displayPriceCards(data) {
    const container = document.getElementById("priceCards");
    container.innerHTML = data
      .map(
        (item) => `
      <div class="price-card">
        <div class="card-header">
          <div class="crop-name">${item.icon} ${item.crop}</div>
          <div class="trend-indicator trend-${item.trend}">
            ${item.trend === "up" ? "📈" : "📉"} ${item.trend.toUpperCase()}
          </div>
        </div>
        <div class="price-details">
          <div class="price-item">
            <div class="price-label">Min Price</div>
            <div class="price-value">₹${item.minPrice}</div>
          </div>
          <div class="price-item">
            <div class="price-label">Max Price</div>
            <div class="price-value">₹${item.maxPrice}</div>
          </div>
          <div class="price-item">
            <div class="price-label">Modal Price</div>
            <div class="price-value">₹${item.modalPrice}</div>
          </div>
        </div>
        <div class="market-info">
          <span>📍 ${item.market}</span>
          <span>🕒 ${item.lastUpdated}</span>
        </div>
      </div>
    `
      )
      .join("");
  }

  document.getElementById("state").addEventListener("change", function () {
    const cityMap = {
      punjab: ["Ludhiana", "Amritsar", "Jalandhar"],
      haryana: ["Gurugram", "Faridabad", "Panipat"],
      rajasthan: ["Jaipur", "Jodhpur", "Kota"],
    };
    const cities = cityMap[this.value] || ["Delhi", "Mumbai", "Bangalore"];
    document.getElementById("city").innerHTML =
      '<option value="">Choose City</option>' +
      cities
        .map((c) => `<option value="${c.toLowerCase()}">${c}</option>`)
        .join("");
  });

  window.onload = () => displayPriceCards(samplePriceData.slice(0, 6));
</script>

{% endblock %}
